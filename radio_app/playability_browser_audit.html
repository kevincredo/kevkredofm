<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KevinCredo FM Playability Audit</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #101010;
        --line: rgba(255, 255, 255, 0.12);
        --text: #fff;
        --muted: #969696;
        --mint: #16f4d0;
        --pink: #ff3b64;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 50% -20%, rgba(22,244,208,.13), transparent 32%), var(--bg);
        color: var(--text);
      }
      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
        display: grid;
        gap: 16px;
      }
      h1, p { margin: 0; }
      h1 {
        font-size: clamp(2rem, 5vw, 4.5rem);
        letter-spacing: .08em;
        text-transform: uppercase;
      }
      .panel {
        border: 1px solid var(--line);
        background: rgba(16,16,16,.88);
        padding: 18px;
      }
      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .stat {
        min-height: 96px;
        display: grid;
        align-content: center;
        gap: 8px;
        border: 1px solid var(--line);
        padding: 14px;
      }
      .stat span {
        color: var(--muted);
        font-weight: 900;
        text-transform: uppercase;
        font-size: .78rem;
      }
      .stat strong {
        font-size: 2rem;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      button {
        min-height: 46px;
        border: 1px solid rgba(22,244,208,.42);
        background: rgba(22,244,208,.12);
        color: var(--mint);
        padding: 0 16px;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }
      button.primary {
        background: var(--mint);
        color: #050505;
      }
      progress {
        width: 100%;
        height: 12px;
        accent-color: var(--mint);
      }
      pre {
        max-height: 48vh;
        overflow: auto;
        margin: 0;
        color: var(--muted);
        white-space: pre-wrap;
      }
      .ok { color: var(--mint); }
      .bad { color: var(--pink); }
      @media (max-width: 760px) {
        .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="ok">BROWSER AUDIO AUDIT</p>
        <h1>KevinCredo FM</h1>
        <p id="status">准备检测网易云外链播放可用性。</p>
      </header>
      <section class="panel controls">
        <button id="startBtn" class="primary" type="button">开始全量检测</button>
        <button id="stopBtn" type="button">暂停</button>
        <button id="resetBtn" type="button">重置报告</button>
      </section>
      <section class="panel">
        <progress id="progress" max="1" value="0"></progress>
      </section>
      <section class="summary">
        <div class="stat"><span>Checked</span><strong id="checked">0</strong></div>
        <div class="stat"><span>Playable</span><strong id="playable">0</strong></div>
        <div class="stat"><span>Blocked</span><strong id="blocked">0</strong></div>
        <div class="stat"><span>Unknown</span><strong id="unknown">0</strong></div>
      </section>
      <section class="panel">
        <pre id="log"></pre>
      </section>
      <section class="panel">
        <h2>Stored Report</h2>
        <p id="storedReportSummary" class="muted">No stored report loaded yet.</p>
        <pre id="blockedIdsOutput"></pre>
      </section>
    </main>
    <script src="./library-data.js"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const concurrency = Number(params.get("concurrency") || 12);
      const timeoutMs = Number(params.get("timeout") || 12000);
      const sampleMs = Number(params.get("sample") || 450);
      const allTracks = (window.RADIO_LIBRARY && window.RADIO_LIBRARY.tracks) || [];
      const offset = Number(params.get("offset") || 0);
      const limit = Number(params.get("limit") || 0);
      const tracks = allTracks.slice(offset, limit ? offset + limit : undefined);
      const queue = tracks.map((track, index) => ({ track, index }));
      const counts = { checked: 0, playable: 0, blocked: 0, unknown: 0 };
      const localResults = [];
      const canPostToServer = location.protocol.startsWith("http") && location.host === "127.0.0.1:3898";
      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");
      const progressEl = document.getElementById("progress");
      const storedReportSummaryEl = document.getElementById("storedReportSummary");
      const blockedIdsOutputEl = document.getElementById("blockedIdsOutput");
      let stopped = false;
      let running = false;

      progressEl.max = tracks.length || 1;

      document.getElementById("startBtn").addEventListener("click", () => startAudit());
      document.getElementById("stopBtn").addEventListener("click", () => {
        stopped = true;
        statusEl.textContent = "已暂停。当前已写入本地报告。";
      });
      document.getElementById("resetBtn").addEventListener("click", async () => {
        await fetch("/reset", { method: "POST" });
        location.reload();
      });

      if (params.get("autostart") === "1") {
        window.setTimeout(() => startAudit(), 500);
      }
      renderStoredReport();

      async function startAudit() {
        if (running) return;
        stopped = false;
        running = true;
        localResults.length = 0;
        if (canPostToServer) await fetch("/reset", { method: "POST" });
        statusEl.textContent = `开始检测 ${tracks.length} 首，浏览器并发 ${concurrency}。`;
        const workers = Array.from({ length: concurrency }, (_, workerId) => runWorker(workerId));
        await Promise.all(workers);
        await fetch("/finish", { method: "POST" });
        running = false;
        statusEl.textContent = stopped ? "检测已暂停。" : "检测完成，报告已保存。";
      }

      async function runWorker(workerId) {
        while (!stopped && queue.length) {
          const item = queue.shift();
          const result = await probeTrack(item.track, item.index, workerId);
          localResults.push(result);
          if (canPostToServer) {
            await fetch("/result", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(result),
            }).catch(() => {});
          }
          updateCounts(result);
        }
      }

      async function probeTrack(track, index, workerId) {
        const audio = new Audio();
        audio.preload = "auto";
        audio.muted = true;
        audio.playsInline = true;
        const startedAt = performance.now();
        const result = {
          index,
          workerId,
          id: track.id,
          name: track.name,
          artists: track.artists || [],
          album: track.album || "",
          fee: track.fee,
          status: "unknown",
          reason: "",
          duration: null,
          currentSrc: "",
          errorCode: null,
          elapsedMs: 0,
          checkedAt: new Date().toISOString(),
        };

        try {
          const source = neteaseAudioUrl(track.id);
          const metadata = waitForAudio(audio, ["loadedmetadata", "canplay", "error"], timeoutMs);
          audio.src = source;
          audio.load();
          const firstEvent = await metadata;
          result.currentSrc = audio.currentSrc || source;
          result.duration = Number.isFinite(audio.duration) ? round(audio.duration) : null;
          if (firstEvent === "error") {
            result.status = "blocked_audio_error";
            result.reason = audioErrorReason(audio);
            return finish(result, startedAt, audio);
          }

          await tryMutedPlay(audio, sampleMs);
          if (Number.isFinite(audio.duration) && audio.duration > 8) {
            const tailOk = await seekTail(audio, Math.max(0, audio.duration - 2.5));
            if (tailOk) {
              await tryMutedPlay(audio, Math.min(350, sampleMs));
              result.status = "playable_full_probe";
              result.reason = "metadata、开头播放和尾段 seek 都成功";
            } else {
              result.status = "blocked_tail_error";
              result.reason = audioErrorReason(audio) || "尾段 seek 失败或超时";
            }
          } else {
            result.status = "playable_initial_probe";
            result.reason = "能加载并播放开头，但没有可验证的尾段长度";
          }
        } catch (error) {
          result.status = audio.error ? "blocked_audio_error" : "blocked_no_metadata";
          result.reason = audioErrorReason(audio) || error.message || String(error);
        }
        return finish(result, startedAt, audio);
      }

      function finish(result, startedAt, audio) {
        result.elapsedMs = Math.round(performance.now() - startedAt);
        result.errorCode = audio.error ? audio.error.code : null;
        audio.pause();
        audio.removeAttribute("src");
        audio.load();
        return result;
      }

      function waitForAudio(audio, events, ms) {
        return new Promise((resolve, reject) => {
          const timer = window.setTimeout(() => cleanup(() => reject(new Error("audio timeout"))), ms);
          const handlers = events.map((eventName) => {
            const handler = () => cleanup(() => resolve(eventName));
            audio.addEventListener(eventName, handler, { once: true });
            return [eventName, handler];
          });
          function cleanup(done) {
            window.clearTimeout(timer);
            handlers.forEach(([eventName, handler]) => audio.removeEventListener(eventName, handler));
            done();
          }
        });
      }

      async function seekTail(audio, seconds) {
        try {
          const promise = waitForAudio(audio, ["seeked", "canplay", "error"], timeoutMs);
          audio.currentTime = seconds;
          const eventName = await promise;
          return eventName !== "error";
        } catch (error) {
          return false;
        }
      }

      async function tryMutedPlay(audio, ms) {
        try {
          await audio.play();
          await sleep(ms);
        } catch (error) {
          // Metadata + seek success is still useful even when muted autoplay is restricted.
        } finally {
          audio.pause();
        }
      }

      function updateCounts(result) {
        counts.checked += 1;
        if (result.status === "playable_full_probe" || result.status === "playable_initial_probe") counts.playable += 1;
        else if (result.status.startsWith("blocked_")) counts.blocked += 1;
        else counts.unknown += 1;
        document.getElementById("checked").textContent = counts.checked;
        document.getElementById("playable").textContent = counts.playable;
        document.getElementById("blocked").textContent = counts.blocked;
        document.getElementById("unknown").textContent = counts.unknown;
        progressEl.value = counts.checked;
        statusEl.textContent = `${counts.checked}/${tracks.length} · playable ${counts.playable} · blocked ${counts.blocked} · unknown ${counts.unknown}`;
        if (counts.checked % 20 === 0 || counts.checked === tracks.length) saveLocalReport(counts.checked === tracks.length);
        const line = `${counts.checked}/${tracks.length} ${result.status} · ${result.name} · ${result.artists.join(", ")} · ${result.reason}`;
        logEl.textContent = `${line}\n${logEl.textContent}`.slice(0, 9000);
      }

      function saveLocalReport(final) {
        const byStatus = {};
        const byFee = {};
        localResults.forEach((row) => {
          byStatus[row.status] = (byStatus[row.status] || 0) + 1;
          const fee = String(row.fee ?? "missing");
          byFee[fee] ||= {};
          byFee[fee][row.status] = (byFee[fee][row.status] || 0) + 1;
        });
        const payload = {
          generatedAt: new Date().toISOString(),
          final,
          method: "Browser Audio probe. Metadata load + muted playback + tail seek when possible.",
          source: location.href,
          total: tracks.length,
          checked: localResults.length,
          summary: { ...counts, byStatus, byFee },
          results: localResults,
        };
        try {
          localStorage.setItem("KCFM_PLAYABILITY_BROWSER_REPORT", JSON.stringify(payload));
          renderStoredReport();
        } catch (error) {
          localStorage.setItem("KCFM_PLAYABILITY_BROWSER_SUMMARY", JSON.stringify({ ...payload, results: [] }));
        }
      }

      function renderStoredReport() {
        try {
          const raw = localStorage.getItem("KCFM_PLAYABILITY_BROWSER_REPORT");
          if (!raw) return;
          const report = JSON.parse(raw);
          const blockedIds = (report.results || [])
            .filter((row) => String(row.status || "").startsWith("blocked_"))
            .map((row) => String(row.id))
            .filter(Boolean)
            .sort((a, b) => Number(a) - Number(b));
          storedReportSummaryEl.textContent = `${report.checked || 0}/${report.total || 0} checked · ${report.summary?.playable || 0} playable · ${blockedIds.length} blocked`;
          blockedIdsOutputEl.textContent = JSON.stringify(blockedIds, null, 2);
        } catch (error) {
          storedReportSummaryEl.textContent = `Stored report could not be read: ${error.message || error}`;
        }
      }

      function neteaseAudioUrl(id) {
        return `https://music.163.com/song/media/outer/url?id=${encodeURIComponent(id)}.mp3`;
      }

      function audioErrorReason(audio) {
        const code = audio.error ? audio.error.code : null;
        if (code === 1) return "播放被中止";
        if (code === 2) return "网络错误";
        if (code === 3) return "解码失败";
        if (code === 4) return "浏览器不支持或网易云未返回可播放音频";
        return "";
      }

      function sleep(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      function round(value) {
        return Math.round(value * 100) / 100;
      }
    </script>
  </body>
</html>
